name: Build Amethyst Lantern Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # Cho phép chạy thủ công từ tab Actions
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Cài Java 17 (bắt buộc cho Forge 1.20.1)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Cài đúng Gradle 8.1.1 (Forge 1.20.1 không hỗ trợ Gradle 9+)
      - name: Setup Gradle 8.1.1
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.1.1'

      # 4. Cache Forge dependencies
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/forge
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 5. Build dùng gradle trực tiếp (không cần gradlew)
      - name: Build with Gradle
        run: gradle build --no-daemon
        env:
          GRADLE_OPTS: "-Xmx3g -Xms512m"

      # 6. Upload .jar
      - name: Upload mod JAR
        uses: actions/upload-artifact@v4
        with:
          name: amethyst-lantern-mod-jar
          # Exclude the *-sources.jar và *-all.jar, chỉ lấy file chính
          path: |
            build/libs/*.jar
            !build/libs/*-sources.jar
            !build/libs/*-all.jar
          retention-days: 30

      # 7. (Tùy chọn) Tạo GitHub Release tự động khi push tag
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/libs/*.jar
            !build/libs/*-sources.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
